name: Sync Reservations

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reservations sync endpoint
        env:
          SYNC_URL: ${{ secrets.SYNC_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SYNC_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing SYNC_URL or CRON_SECRET repository secret."
            exit 1
          fi

          http_code=$(curl -sS -o response.json -w "%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SYNC_URL")

          echo "HTTP status: $http_code"
          cat response.json

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "Sync request failed."
            exit 1
          fi
